apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: duan0029/order-service
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: MONGO_URI
              value: "mongodb://admin:password123@mongodb:27017/?authSource=admin"
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: RABBITMQ_URL