apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-consumer
  template:
    metadata:
      labels:
        app: inventory-consumer
    spec:
      containers:
        - name: inventory-consumer
          image: duan0029/inventory-consumer
          env:
            - name: PORT
              value: "3004"
            - name: MONGO_URI
              value: "mongodb://admin:password123@mongodb:27017/?authSource=admin"
            - name: MONGO_DB
              value: "bestbuy_products"
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: RABBITMQ_URL
            - name: EXCHANGE_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: EXCHANGE_NAME
            - name: QUEUE_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: INVENTORY_QUEUE