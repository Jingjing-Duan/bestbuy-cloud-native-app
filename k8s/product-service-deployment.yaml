apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: duan0029/product-service
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: MONGO_URI
              value: "mongodb://admin:password123@mongodb:27017/?authSource=admin"
            - name: MONGO_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: PRODUCT_DB_NAME